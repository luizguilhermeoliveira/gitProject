<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

	<title>Document</title>
</head>
<body>
	<div class="container mt-4">
        <h2>Adicionar Novo Filme</h2>
        
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <input type="text" id="inputTitulo" class="form-control" placeholder="Título do Filme" required>
            </div>
            <div class="col-md-3">
                <input type="text" id="inputGenero" class="form-control" placeholder="Gênero" required>
            </div>
            <div class="col-md-2">
                <input type="number" id="inputNota" class="form-control" placeholder="Nota" min="0" max="10" required>
            </div>
            <div class="col-md-2 d-grid">
                <button type="button" id="btnAdicionar" class="btn btn-primary">Adicionar</button>
            </div>

            <div class="col-md-2 d-grid">
                <button id="remover"  class="btn btn-danger">Remover</button>
            </div>
        </div>

		<table class="table table-striped table-hover" id="tabela-filmes">
			<thead>
				<tr>
					<th scope="col">#</th>
					<th scope="col">Titulo</th>
					<th scope="col">Genero</th>
					<th scope="col">Nota</th>
				</tr>
			</thead>
			<tbody id="corpoTabela">
				<tr>
					<th scope="row">1</th>
					<td>As Branquelas</td>
					<td>Comédia</td>
					<td>10</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>
</html>
<script src="script.js"></script>
